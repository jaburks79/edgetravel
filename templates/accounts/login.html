{% extends 'base/base.html' %}
{% block title %}Log In{% endblock %}
{% block content %}
<section class="section">
    <div class="container container-tight">
        <h1 class="section-title center">Log In</h1>
        <form method="post" class="edge-form">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<p class="form-error">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-lg btn-block">Log In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{% url 'register' %}">Join free</a></p>
    </div>
</section>
{% endblock %}
